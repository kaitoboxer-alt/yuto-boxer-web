<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gallery - B.B.PW</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: 'M PLUS 1 Code', monospace; color: #fff; overflow-x: hidden; }

        /* コピー対策：基本は全て禁止 [cite: 2026-03-03] */
        img { pointer-events: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }

        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #000 0%, #001530 100%); z-index: -1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px 150px 20px; text-align: center; }
        .title { color: #ffd700; font-size: 2.5rem; letter-spacing: 0.5rem; margin-bottom: 60px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }

        .gallery-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; }

        /* ポラロイド風カードデザイン [cite: 2026-03-01] */
        .art-card {
            background: #fdfdfd; padding: 12px 12px 40px 12px; border-radius: 2px;
            box-shadow: 5px 15px 35px rgba(0,0,0,0.8); transition: 0.4s; cursor: pointer;
            border: 1px solid #ddd; pointer-events: auto;
        }
        .art-card img { width: 100%; height: auto; display: block; filter: contrast(1.05); }

        /* ランダムな傾き演出 [cite: 2026-03-01] */
        .art-card:nth-child(3n+1) { transform: rotate(-2deg); }
        .art-card:nth-child(3n+2) { transform: rotate(3deg) translateY(10px); }
        .art-card:nth-child(3n+3) { transform: rotate(-1deg) translateY(-5px); }

        .art-card:hover { transform: rotate(0deg) scale(1.1) !important; z-index: 100; box-shadow: 0 0 40px #00f0ff; border-color: #00f0ff; }

        /* 拡大表示（Lightbox） [cite: 2026-03-01] */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border: 5px solid #fff; pointer-events: auto; }

        /* 共通ナビ [cite: 2026-03-01] */
        .bottom-nav { position: fixed; bottom: 40px; left: 30px; right: 30px; display: flex; gap: 10px; z-index: 1000; align-items: center; }
        .nav-item { position: relative; background: rgba(0, 5, 15, 0.85); border: 1.5px solid rgba(255, 255, 255, 0.2); color: #fff; text-decoration: none; padding: 12px 18px; border-radius: 6px; font-size: 0.85rem; transition: 0.3s; pointer-events: auto; }
        .nav-item.current { border-color: #bd00ff; box-shadow: 0 0 12px #bd00ff; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-fixed"></div>
    <div class="container">
        <h1 class="title">B.B.PW ART GALLERY</h1>
        <div class="gallery-grid" id="main-grid"></div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

    <nav id="global-nav" class="bottom-nav"></nav>

    <script>
        // 縦向き・横向き全15枚の統合リスト [cite: 2026-03-05, 2026-03-06]
        const images = [
            // 横向き (l01 - l06)
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l01.png",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l02.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l03.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l04.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l05.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l06.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l06.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l07.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l08.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l09.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l10.webp",
            "https://media.yuto-boxer.com/03_gallery/landscape/20260306_l1.webp"
        ];

        const grid = document.getElementById('main-grid');
        images.forEach(src => {
            const card = document.createElement('div');
            card.className = 'art-card';

            // 縦横比に応じてカードの最大幅を調整 [cite: 2026-03-01]
            if (src.includes('/landscape/')) {
                card.style.maxWidth = '340px';
            } else {
                card.style.maxWidth = '260px';
            }

            card.onclick = () => {
                document.getElementById('lightbox-img').src = src;
                document.getElementById('lightbox').style.display = 'flex';
            };
            card.innerHTML = `<img src="${src}">`;
            grid.appendChild(card);
        });

        // ナビゲーションの初期化（config.json参照） [cite: 2026-03-01]
        async function initNav() {
            const configPath = '/666_pP6PqS_frG-H_Friday-the-13th/00_text/00_System_text/config.json';
            try {
                const res = await fetch(configPath); const data = await res.json();
                const nav = document.getElementById('global-nav');
                Object.keys(data.menu_items).forEach(key => {
                    const item = data.menu_items[key]; if (!item.active) return;
                    const a = document.createElement('a'); a.href = item.path; a.className = 'nav-item'; a.innerText = item.label;
                    if (window.location.pathname.includes(item.path)) a.classList.add('current');
                    nav.appendChild(a);
                });
            } catch(e) { console.warn("Navigation config load failed."); }
        }
        window.onload = initNav;
    </script>
</body>
</html>
