<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>B.B.PW - Area</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'M PLUS 1 Code', monospace; }
        
        img { pointer-events: none; user-select: none; }

        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://media.yuto-boxer.com/common/placeholder_bg.webp') no-repeat center; background-size: cover; filter: brightness(0.2); z-index: 1; }
        .msg-container { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .msg-box { border: 1px solid #333; padding: 40px; border-radius: 12px; background: rgba(0,0,0,0.6); color: #888; text-align: center; }

        .bottom-nav { position: fixed; bottom: 60px; left: 30px; right: 30px; display: flex; gap: 10px; z-index: 1000; align-items: center; }
        .nav-item { position: relative; background: rgba(0, 5, 15, 0.8); border: 1.5px solid rgba(255, 255, 255, 0.15); color: #fff; text-decoration: none; padding: 12px 18px; border-radius: 6px; font-size: 0.85rem; transition: 0.3s; white-space: nowrap; }
        .nav-item:not(.current):hover { border-color: #00f0ff; transform: translateY(-3px); }
        .nav-item.current { border-color: #bd00ff; box-shadow: 0 0 12px #bd00ff; pointer-events: none; }
        .nav-item::after { content: attr(data-tooltip); position: absolute; bottom: calc(100% + 15px); left: 50%; transform: translateX(-50%); background: rgba(0, 240, 255, 0.2); border: 1px solid #00f0ff; color: #00f0ff; padding: 6px 14px; border-radius: 4px; font-size: 0.75rem; opacity: 0; visibility: hidden; transition: 0.2s; }
        .nav-item:hover::after { opacity: 1; visibility: visible; }
        .send-message-btn { margin-left: auto; background: rgba(0, 240, 255, 0.15); border: 1.5px solid #00f0ff; color: #00f0ff; border-radius: 50px; font-weight: bold; min-width: 160px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" onmousedown="if(event.button==2) return false;">
    <div class="bg-fixed"></div>
    <div class="msg-container"><div class="msg-box"><h2>UNDER CONSTRUCTION</h2><p>このエリアは現在、制作中です。</p></div></div>
    <nav id="global-nav" class="bottom-nav"></nav>
    <script>
        const configPath = '/666_pP6PqS_frG-H_Friday-the-13th/00_text/00_System_text/config.json';
        async function initNav() {
            try {
                const res = await fetch(configPath); const data = await res.json();
                const nav = document.getElementById('global-nav'); const currentPath = window.location.pathname;
                Object.keys(data.menu_items).forEach(key => {
                    const item = data.menu_items[key]; if (!item.active) return;
                    const a = document.createElement('a'); a.href = item.path; a.className = 'nav-item'; a.innerText = item.label; a.setAttribute('data-tooltip', item.jp);
                    if (key === 'send_message') a.classList.add('send-message-btn');
                    if (currentPath.indexOf(item.path) !== -1) a.classList.add('current');
                    nav.appendChild(a);
                });
            } catch(e) {}
        }
        window.onload = initNav;
    </script>
</body>
</html>
